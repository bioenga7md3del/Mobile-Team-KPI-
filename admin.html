<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - الإدارة</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
<nav class="navbar"><h2><img src="FGC.jpeg" style="height:30px"> لوحة إدارة الإجازات - الإدارة</h2></nav>
<div class="container">
    <div class="card">
        <table id="adminTable">
            <thead><tr><th>الموقع</th><th>الموظف</th><th>البداية</th><th>النهاية</th><th>الحالة</th><th>إجراء</th></tr></thead>
            <tbody id="adminBody"></tbody>
        </table>
    </div>
</div>
<script>
    const db = firebase.firestore();
    db.collection("vacations").onSnapshot(snap => {
        const tbody = document.getElementById('adminBody');
        tbody.innerHTML = "";
        snap.forEach(doc => {
            const v = doc.data();
            tbody.innerHTML += `<tr>
                <td>${v.siteName}</td><td>${v.empName}</td><td>${v.startDate}</td><td>${v.endDate}</td>
                <td>${v.status}</td>
                <td>
                    <button onclick="db.collection('vacations').doc('${doc.id}').update({status:'approved'})" class="btn btn-success">اعتماد</button>
                    <button onclick="db.collection('vacations').doc('${doc.id}').update({status:'rejected'})" class="btn btn-danger">رفض</button>
                </td>
            </tr>`;
        });
    });
</script>
</body>
</html>
