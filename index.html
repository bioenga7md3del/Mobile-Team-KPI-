<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الإجازات - FGC</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #1a3c6d; --accent: #e67e22; --bg-color: #f4f7f6; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo { max-width: 120px; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; text-align: right; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-auth { background-color: var(--primary); color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .toggle-link { color: var(--primary); cursor: pointer; display: block; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="auth-container">
        <img src="FGC.jpeg" alt="FGC Logo" class="logo">
        
        <div id="loginForm">
            <h2>تسجيل الدخول</h2>
            <div class="input-group"><input type="email" id="loginEmail" placeholder="البريد الإلكتروني" dir="ltr"></div>
            <div class="input-group"><input type="password" id="loginPassword" placeholder="كلمة المرور" dir="ltr"></div>
            <button onclick="login()" class="btn-auth">دخول</button>
            <span class="toggle-link" onclick="toggleForms()">ليس لديك حساب؟ إنشاء حساب جديد</span>
        </div>

        <div id="signupForm" style="display: none;">
            <h2>إنشاء حساب جديد</h2>
            <div class="input-group"><input type="email" id="signupEmail" placeholder="البريد الإلكتروني" dir="ltr"></div>
            <div class="input-group"><input type="password" id="signupPassword" placeholder="كلمة المرور" dir="ltr"></div>
            <button onclick="signup()" class="btn-auth">إنشاء الحساب</button>
            <span class="toggle-link" onclick="toggleForms()">لديك حساب بالفعل؟ تسجيل الدخول</span>
        </div>
    </div>

<script>
    // الإعدادات التي أرسلتها أنت
    const firebaseConfig = {
        apiKey: "AIzaSyC5Dh7bJzPqLaZl4djKCgpzaHHSeeD1aHU",
        authDomain: "phaseten-435bf.firebaseapp.com",
        projectId: "phaseten-435bf",
        storageBucket: "phaseten-435bf.firebasestorage.app",
        messagingSenderId: "780298483879",
        appId: "1:780298483879:web:6b6627e673d4808e098382",
        measurementId: "G-58E5DVZHZ6"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function toggleForms() {
        document.getElementById('loginForm').style.display = document.getElementById('loginForm').style.display === 'none' ? 'block' : 'none';
        document.getElementById('signupForm').style.display = document.getElementById('signupForm').style.display === 'none' ? 'block' : 'none';
    }

    // التحقق التلقائي
    auth.onAuthStateChanged(user => { if(user) routeUser(user.uid); });

    async function routeUser(uid) {
        const doc = await db.collection('users').doc(uid).get();
        if(doc.exists && doc.data().role === 'admin') window.location.href = "admin.html";
        else window.location.href = "user.html";
    }

    async function login() {
        try {
            const e = document.getElementById('loginEmail').value;
            const p = document.getElementById('loginPassword').value;
            const cred = await auth.signInWithEmailAndPassword(e, p);
            routeUser(cred.user.uid);
        } catch (e) { alert("خطأ في الدخول: " + e.message); }
    }

    async function signup() {
        try {
            const e = document.getElementById('signupEmail').value;
            const p = document.getElementById('signupPassword').value;
            const cred = await auth.createUserWithEmailAndPassword(e, p);
            await db.collection('users').doc(cred.user.uid).set({ email: e, role: 'user' });
            window.location.href = "user.html";
        } catch (e) { alert("خطأ في الإنشاء: " + e.message); }
    }
</script>
</body>
</html>
